name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
          - os: macos-latest
            name: macos-arm64
          - os: macos-13
            name: macos-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Package binary and checksum
        run: |
          mkdir -p dist
          cp build/jpick "dist/jpick-${{ matrix.name }}"
          cd dist
          shasum -a 256 "jpick-${{ matrix.name }}" > "jpick-${{ matrix.name }}.sha256"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/jpick-${{ matrix.name }}
            dist/jpick-${{ matrix.name }}.sha256
          generate_release_notes: true
